# Deployer default compose artifact (source of truth for deploy-like runs).
# https://deployer.driffle.net/ — do not define deployer_platform here (platform injects external network + merge files).
#
# Primary publish: first service with `ports` must be the HTTP API (bugs-reporter). Postgres/Redis use `expose` only
# so Deployer does not treat DB port as the public app port. For host access to DBs locally, use docker-compose.yml overrides.
#
# Managed backend hostnames (Deployer / embedded): postgres, redis

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  bugs-reporter:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:-postgresql://bugs:bugs@postgres:5432/bugs_reporter}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      CHANNEL_ID: ${CHANNEL_ID:-}
      PROCESS_THREADS: ${PROCESS_THREADS:-false}
      PLANE_BASE_URL: ${PLANE_BASE_URL:-https://plan.driffle.org}
      PLANE_API_KEY: ${PLANE_API_KEY:-}
      PLANE_WORKSPACE_SLUG: ${PLANE_WORKSPACE_SLUG:-driffle}
      PLANE_PROJECT_ID: ${PLANE_PROJECT_ID:-}
      PLANE_STATE_ID: ${PLANE_STATE_ID:-}
      PLANE_LABEL_IDS: ${PLANE_LABEL_IDS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: ["sh", "-c", "npx prisma migrate deploy && exec node dist/main.js"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bugs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bugs}
      POSTGRES_DB: ${POSTGRES_DB:-bugs_reporter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugs -d bugs_reporter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
