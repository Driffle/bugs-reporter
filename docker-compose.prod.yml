# Deployer default compose artifact (source of truth for deploy-like runs).
# https://deployer.driffle.net/ — do not define deployer_platform here (platform injects external network + merge files).
#
# Primary publish: first service with `ports` must be the HTTP API (bugs-reporter). Postgres/Redis use `expose` only
# so Deployer does not treat DB port as the public app port. For host access to DBs locally, use docker-compose.yml overrides.
#
# Env: do NOT bake DATABASE_URL / secrets here — they come from repo .env (local) or Deployer merge (.deployer.env / managed
# backends). A default like bugs:bugs breaks auth (P1000) when the platform provisions driffle_* DB users.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  bugs-reporter:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
    command: ["sh", "-c", "npx prisma migrate deploy && exec node dist/main.js"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bugs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bugs}
      POSTGRES_DB: ${POSTGRES_DB:-bugs_reporter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
