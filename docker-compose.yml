# Local dev: reuse prod definitions; add host port maps for Postgres/Redis (psql/redis-cli from your machine).
# Usage: cp .env.example .env && docker compose up --build
# Validate prod file: docker compose -f docker-compose.prod.yml config

include:
  - docker-compose.prod.yml

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
